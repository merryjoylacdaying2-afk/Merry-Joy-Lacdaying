<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHII COFFEE - Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">CHII COFFEE</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="dessert.html">Desserts</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="story.html">Our Story</a></li>
            </ul>
        </nav>
    </header>

    <h2 class="section-title">Our Product Drinks</h2>

    <div class="shop-layout">
        <aside class="filters">
            <div class="filter-group">
                <h4>Tea Base</h4>
                <label><input type="checkbox" checked> Matcha</label>
                <label><input type="checkbox" checked> Brown Sugar</label>
                <label><input type="checkbox"> Milk Tea</label>
            </div>
            <div class="filter-group">
                <h4>Sweetness</h4>
                <label><input type="radio" name="sweet"> 100% Regular</label>
                <label><input type="radio" name="sweet"> 70% Less</label>
                <label><input type="radio" name="sweet"> 50% Half</label>
            </div>
        </aside>

        <main class="product-grid">
            <div class="product-card">
                <img src="image.joy/1780554748778.png" alt="Matcha Boba">
                width="300">
                <h3>Matcha Boba Specialty</h3>
                <div class="price">₱180.00</div>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="image.joy/1780554753730.png" alt="Caramel Brown Sugar">
                <h3>Caramel Brown Sugar</h3>
                <div class="price">₱170.00</div>
                <button class="btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="image.joy/Gemini_Generated_Image_9j5owu9j5owu9j5o.png" alt="Coffee Boba">
                <h3>Coffee Boba Cream</h3>
                <div class="price">₱190.00</div>
                <button class="btn">Add to Cart</button>
            </div>
        </main>
    </div>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 CHII COFFEE. All Rights Reserved.
        </div>
    </footer>

</body>
</html>
